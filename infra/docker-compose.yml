version: "3.8"

services:
  router-a:
    build: ./routers/router-a
    container_name: router-a
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    privileged: true
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.rp_filter: 0
      net.ipv4.conf.default.rp_filter: 0
    networks:
      net-a:
        ipv4_address: 10.10.1.4
      wan:
        ipv4_address: 172.20.0.5
    volumes:
      - ./routers/router-a/frr.conf:/etc/frr/frr.conf
      - ./routers/router-a/daemons:/etc/frr/daemons

  router-b:
    build: ./routers/router-b
    container_name: router-b
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    privileged: true
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.rp_filter: 0
      net.ipv4.conf.default.rp_filter: 0
    networks:
      net-b:
        ipv4_address: 10.10.2.2
      wan:
        ipv4_address: 172.20.0.2
    volumes:
      - ./routers/router-b/frr.conf:/etc/frr/frr.conf
      - ./routers/router-b/daemons:/etc/frr/daemons

  web:
    image: nginx:alpine
    container_name: web
    networks:
      net-a:
        ipv4_address: 10.10.1.10

  dns:
    image: coredns/coredns:latest
    container_name: dns
    command: -conf /etc/coredns/Corefile
    volumes:
      - ./services/dns/Corefile:/etc/coredns/Corefile:ro
    networks:
      net-a:
        ipv4_address: 10.10.1.53

  host-a:
    image: alpine
    container_name: host-a
    command: ["sh", "-c", "sleep infinity"]
    networks:
      net-a:
        ipv4_address: 10.10.1.100
    dns:
      - 10.10.1.53

networks:
  net-a:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
    ipam:
      config:
        - subnet: 10.10.1.0/24

  net-b:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
    ipam:
      config:
        - subnet: 10.10.2.0/24

  wan:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
    ipam:
      config:
        - subnet: 172.20.0.0/27